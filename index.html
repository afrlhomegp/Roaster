<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Spline+Sans+Mono:wght@400;500;600&display=swap');
  :root{
    --bg:#0c1320; --bg2:#131d2e; --panel:#172338; --panel2:#1e2d45;
    --line:#2a3a55; --line2:#35496b;
    --txt:#e8eef7; --txt2:#9fb3cf; --txt3:#64789a;
    --accent:#f5a623; --accent2:#ffc14d;
    --blue:#4f9dff; --teal:#22c1c3;
    --red:#ff5a5a; --redbg:#3a1620; --orange:#ff8c3b; --orangebg:#3a2415;
    --yellow:#ffd23f; --yellowbg:#3a3415; --green:#3fd77a; --greenbg:#15321f;
    --shadow:0 10px 30px rgba(0,0,0,.4);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Archivo',sans-serif;background:var(--bg);color:var(--txt);
    background-image:radial-gradient(circle at 12% 0%,rgba(79,157,255,.07),transparent 40%),
      radial-gradient(circle at 88% 100%,rgba(245,166,35,.06),transparent 45%);
    min-height:100vh;font-size:14px}
  .mono{font-family:'Spline Sans Mono',monospace}
  /* Top bar */
  header{position:sticky;top:0;z-index:50;background:var(--hbg,rgba(12,19,32,.92));
    backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:0 22px;padding-top:env(safe-area-inset-top,0px)}
  body{padding-left:env(safe-area-inset-left,0px);padding-right:env(safe-area-inset-right,0px)}
  .hwrap{display:flex;align-items:center;gap:18px;height:62px;max-width:1500px;margin:0 auto}
  .logo{display:flex;align-items:center;gap:11px;font-weight:800;font-size:16px;letter-spacing:-.3px}
  .logo .ic{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#e07a00);
    display:grid;place-items:center;font-size:18px;box-shadow:0 4px 14px rgba(245,166,35,.4)}
  .logo small{display:block;font-size:10px;font-weight:500;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase}
  .clock{margin-left:14px;text-align:right;font-size:12px;color:var(--txt2)}
  .clock b{color:var(--accent2);font-size:14px}
  /* ===== Header notification bell ===== */
  .bellbtn{position:relative;margin-left:auto;flex:0 0 auto;width:40px;height:40px;border-radius:11px;background:var(--panel2);border:1px solid var(--line2);color:var(--txt);font-size:19px;line-height:1;cursor:pointer;display:grid;place-items:center;transition:.15s}
  .bellbtn:hover{border-color:var(--accent);color:var(--accent2)}
  .bellbtn.has{animation:bellRing 2.6s ease-in-out infinite;transform-origin:50% 4px}
  @keyframes bellRing{0%,55%,100%{transform:rotate(0)}58%{transform:rotate(14deg)}62%{transform:rotate(-12deg)}66%{transform:rotate(8deg)}70%{transform:rotate(-5deg)}74%{transform:rotate(0)}}
  .bell-badge{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;background:var(--red);color:#fff;font-size:10px;font-weight:800;font-family:'Spline Sans Mono';display:flex;align-items:center;justify-content:center;border:2px solid var(--bg2);box-shadow:0 2px 6px rgba(0,0,0,.4);animation:badgePulse 1.4s infinite}
  @keyframes badgePulse{0%,100%{box-shadow:0 0 0 0 rgba(255,90,90,.6)}50%{box-shadow:0 0 0 6px rgba(255,90,90,0)}}
  .bellpop-back{position:fixed;inset:0;z-index:115;display:none}
  .bellpop-back.show{display:block}
  .bellpop{position:fixed;top:64px;right:14px;width:min(380px,calc(100vw - 28px));max-height:72vh;overflow:auto;background:var(--bg2);border:1px solid var(--line2);border-radius:14px;box-shadow:0 22px 60px rgba(0,0,0,.55);z-index:116;display:none;animation:fade .18s ease}
  .bellpop.show{display:block}
  .bellpop-h{display:flex;align-items:center;gap:9px;padding:13px 15px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg2);z-index:1}
  .bellpop-h b{font-size:14px}
  .bellpop-tabs{padding:10px 12px 4px;position:sticky;top:47px;background:var(--bg2);z-index:1}
  .bellpop-tabs .spectab{flex:1;justify-content:center}
  .bellpop-tabs .spectab b{font-family:'Spline Sans Mono'}
  .bellpop-h .x{margin-left:auto;background:var(--panel2);border:1px solid var(--line2);color:var(--txt2);width:30px;height:30px;border-radius:9px;font-size:15px;cursor:pointer}
  .bellpop-empty{padding:26px 16px;text-align:center;color:var(--txt3);font-size:13px}
  .bp-day{font-size:11px;font-weight:800;color:var(--accent2);background:var(--panel2);padding:6px 14px;letter-spacing:.3px}
  .bp-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:.12s;border-left:4px solid transparent}
  .bp-row:hover{background:rgba(245,166,35,.08);border-left-color:var(--accent)}
  .bp-mc{font-family:'Spline Sans Mono';font-weight:800;font-size:15px;color:var(--accent2);flex:0 0 auto;width:46px}
  .bp-mid{flex:1 1 auto;min-width:0}
  .bp-job{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bp-meta{font-size:10.5px;color:var(--txt3);font-weight:600;margin-top:1px}
  .bp-right{flex:0 0 auto;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .bp-rem{font-family:'Spline Sans Mono';font-weight:800;font-size:10px;color:#fff;background:var(--rc);border-radius:7px;padding:2px 7px;white-space:nowrap}
  .bp-tag{font-size:9px;font-weight:800;color:var(--tc);border:1px solid var(--tc);border-radius:9px;padding:1px 7px;letter-spacing:.3px}
  .bellpop-foot{padding:10px 14px;position:sticky;bottom:0;background:var(--bg2);border-top:1px solid var(--line)}
  /* Nav */
  nav{display:flex;gap:3px;padding:0 14px;padding-bottom:env(safe-area-inset-bottom,0px);background:rgba(12,19,32,.96);backdrop-filter:blur(14px);border-top:1px solid var(--line);
    overflow-x:auto;position:fixed;bottom:0;left:0;right:0;z-index:60;box-shadow:0 -6px 24px rgba(0,0,0,.35)}
  nav .nwrap{display:flex;gap:3px;max-width:1500px;margin:0 auto;width:100%;justify-content:center}
  nav button{position:relative;background:none;border:none;color:var(--txt2);padding:9px 14px 10px;font-family:inherit;
    font-size:11px;font-weight:600;cursor:pointer;border-top:2.5px solid transparent;white-space:nowrap;
    transition:.15s;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:62px}
  nav button:hover{color:var(--txt)}
  nav button.on{color:var(--accent2);border-top-color:var(--accent);background:rgba(245,166,35,.06)}
  nav button .ic2{font-size:17px;line-height:1}
  nav button .badge{position:absolute;top:3px;right:8px;background:var(--red);color:#fff;font-size:9px;padding:0 5px;border-radius:9px;font-weight:700}
  main{max-width:1500px;margin:0 auto;padding:22px 22px 96px}
  .view{display:none;animation:fade .35s ease}
  .view.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  h2.title{font-size:21px;font-weight:800;letter-spacing:-.4px;margin-bottom:3px;display:flex;align-items:center;gap:10px}
  .synced{display:inline-grid;place-items:center;color:var(--txt3);opacity:.8}
  .synced.cl-connected{color:var(--green);opacity:1}
  .synced.cl-error{color:var(--red);opacity:1}
  .synced.cl-connecting,.synced.cl-off{color:#ffffff;opacity:.95}
  body.light .synced.cl-connecting,body.light .synced.cl-off{color:#64748b}
  .synced svg{width:20px;height:20px}
  .sub{color:var(--txt3);font-size:12.5px;margin-bottom:20px}
  /* KPI cards */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden}
  .kpi-click{cursor:pointer;transition:.15s}
  .kpi-click:hover{transform:translateY(-2px);border-color:var(--c);box-shadow:0 10px 24px rgba(0,0,0,.35)}

  body.light{ --bg:#eef2f7; --bg2:#e6ecf4; --panel:#ffffff; --panel2:#eef3fa; --line:#d8e0ec; --line2:#c6d2e2; --txt:#1a2435; --txt2:#4a5a72; --txt3:#8493a8; --redbg:#fde8ea; --orangebg:#fdeede; --yellowbg:#faf3d6; --greenbg:#e2f6ea; --shadow:0 10px 30px rgba(30,50,80,.10); --hbg:rgba(255,255,255,.9); }

  .themebtn{padding:9px 16px;border-radius:9px;border:1px solid var(--line2);background:var(--panel2);color:var(--txt2);font-weight:700;cursor:pointer;font-family:inherit;font-size:13px}

  /* ===== Fullscreen toggle button (header) ===== */

  /* ===== Display-scale (zoom) controls in Settings ===== */

  /* floating prev/next arrows OUTSIDE the machine popup.

     truly fixed to the viewport and do not scroll with the popup content.
     Hidden on mobile (navigation via swipe); shown only on desktop. */
  .mnav{position:fixed;top:50%;transform:translateY(-50%);width:50px;height:50px;border-radius:50%;background:rgba(23,35,56,.94);border:1px solid var(--line2);color:var(--txt);font-size:30px;line-height:1;cursor:pointer;z-index:125;display:none;place-items:center;box-shadow:0 8px 24px rgba(0,0,0,.55);transition:.15s;font-family:inherit}

  th.thsel.thcol-sekarang{background:#3fd77a!important;color:#0c1320!important}
  th.thsel.thcol-baru{background:#4f9dff!important;color:#0c1320!important}

  td.tdsel.tdcol-sekarang{background:rgba(63,215,122,.16)}

  /* header kolom Lama/Sekarang/Baru dengan tanggal di bawah label */

  th.thdated{padding-top:7px;padding-bottom:7px}
  th.thdated .thlab{display:block;line-height:1.1}
  th.thdated .thdate{display:block;margin-top:3px;font-family:'Spline Sans Mono';font-weight:700;
    font-size:10.5px;letter-spacing:0;text-transform:none;color:var(--txt3)}
  th.thsel.thdated .thdate{color:inherit;opacity:.85}
  /* toggle Trial pada form JC */
  .jc-trial{display:flex;align-items:flex-start;gap:10px;margin:0 0 14px;padding:11px 13px;border-radius:11px;
    border:1px dashed var(--line2);background:var(--panel2);cursor:pointer;font-size:12.5px;color:var(--txt2);line-height:1.4}
  .jc-trial.on{border-style:solid;border-color:var(--accent);background:rgba(245,166,35,.10)}
  .jc-trial input{width:20px;height:20px;flex:0 0 auto;margin-top:1px;accent-color:var(--accent)}
  .jc-trial b{color:var(--txt)}
  /* pulse on changed info chips + badge */
  .ichip.chg{border-color:#ff8c3b;color:var(--txt);animation:pulseChip 1.4s ease-in-out infinite}
  @keyframes pulseChip{0%,100%{box-shadow:0 0 0 0 rgba(255,140,59,.55)}50%{box-shadow:0 0 0 5px rgba(255,140,59,0)}}
  .pulse-badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:800;color:#ff8c3b;background:rgba(255,140,59,.12);border:1px solid rgba(255,140,59,.4);border-radius:12px;padding:2px 9px;text-transform:uppercase;letter-spacing:.4px;vertical-align:middle}
  .pulse-badge::before{content:'';width:8px;height:8px;border-radius:50%;background:#ff8c3b;animation:pulseDot 1.2s infinite}
  @keyframes pulseDot{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(255,140,59,.6)}50%{opacity:.55;box-shadow:0 0 0 6px rgba(255,140,59,0)}}
  /* machine popup split layout */
  .mpop-split{display:block}
  .mpop-left{display:flex;flex-direction:column;gap:12px}
  .mpop-right{min-width:0}
  @media(min-width:1001px){
    .mpop-split{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}
  }
  .mpop-filter{background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:8px 12px;margin-top:12px}
  /* filter as icon + floating popover (overlay, no layout shift) */
  .sched-head{display:flex;align-items:center;gap:10px;margin-top:10px}
  .sched-head .sectiontitle{margin:0;flex:1 1 auto;min-width:0}
  .filt-wrap{position:relative;flex:0 0 auto}
  .filt-btn{width:34px;height:34px;border-radius:9px;background:var(--panel2);border:1px solid var(--line2);color:var(--txt2);display:grid;place-items:center;cursor:pointer;transition:.15s}
  .filt-btn:hover,.filt-btn.on{border-color:var(--accent);color:var(--accent2)}
  .filt-pop{display:none;position:absolute;top:calc(100% + 6px);right:0;width:300px;max-width:78vw;max-height:54vh;overflow:auto;background:var(--bg2);border:1px solid var(--line2);border-radius:12px;box-shadow:0 18px 50px rgba(0,0,0,.6);padding:12px 14px;z-index:8}
  .filt-pop.show{display:block}

  .filt-pop .fclabel{margin-top:8px;font-size:10.5px}

    #mbox{max-width:1280px}
    .mpop-split{grid-template-columns:300px minmax(0,1fr)}

  @media(min-width:1001px){
    nav{display:none!important}
    main{padding-bottom:30px}
    #shell{transition:margin-left .28s cubic-bezier(.4,0,.2,1)}
    body.dwopen #shell{margin-left:290px}
    #backdrop{opacity:0!important;pointer-events:none!important}
    .fab{bottom:30px;right:30px}
    /* full-height one-screen dashboard */
    .dashpage{height:calc(100vh - 118px);display:flex;flex-direction:column;gap:10px;overflow:hidden}
    .dashpage .kpis{margin-bottom:0!important}
    .dashpage .statbadges{margin-bottom:0!important;flex:0 0 auto}
    .dashpage .achieve{margin-bottom:0!important;flex:0 0 auto}
    .dashpage .dashsplit{flex:1;min-height:0;display:grid;grid-template-columns:1.05fr .95fr;gap:16px;align-items:stretch}
    .dashleft{min-height:0;display:flex;flex-direction:column;gap:12px;margin-top:0}
    .pmhero{flex:0 0 auto}
    .chartrow{flex:1;min-height:0}
    .trendcard{flex:1.15;min-height:0}
    .dashleft .card{display:flex;flex-direction:column;min-height:0;padding:13px 15px}
    .dashleft .card h3{margin-bottom:8px}
    .dashleft .chwrap{flex:1 1 auto;height:auto;min-height:0}
    .dashleft .chwrap canvas{height:100%!important}
    .pmhero .pmhero-body{flex:1 1 auto;min-height:0;justify-content:flex-start}
    .pmhero-chart{flex:0 0 140px;width:140px;height:140px;max-height:160px}
    .dashright{min-height:0;display:flex;flex-direction:column}
    .dashright .sectiontitle{margin-top:0;flex:0 0 auto}
    .dashright .mgroups{flex:1;min-height:0;overflow:auto}
    .dashright .mtiles{grid-template-columns:repeat(auto-fill,minmax(118px,1fr))}
  }
  @media(min-width:1180px){}

  /* roaster plan badge on machine-popup matrix cell */
  table.matx .mcl.rplan{box-shadow:inset 0 0 0 2px var(--teal);}
  .rbadge{position:absolute;top:-8px;left:-7px;background:var(--teal);color:#03201f;font-size:9px;font-weight:800;line-height:1.5;padding:0 5px;border-radius:9px;font-family:'Spline Sans Mono';box-shadow:0 2px 7px rgba(0,0,0,.5);border:1.5px solid var(--bg2);z-index:3;pointer-events:none;white-space:nowrap}
  .roaster-note{background:rgba(34,193,195,.10);border-left:3px solid var(--teal);padding:9px 13px;border-radius:8px;font-size:11.5px;color:var(--txt2);margin:6px 0;line-height:1.5}
  .roaster-note b{color:var(--teal)}
  /* add-record multi chips */
  .addchips{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .addchips .fchip{font-size:12px;padding:6px 12px}
  .sess-pill{margin-left:auto;font-size:11px;font-weight:700;background:var(--greenbg);color:var(--green);padding:4px 11px;border-radius:20px;border:1px solid var(--green)}
  /* JC roaster row list */
  .roln{display:flex;align-items:center;gap:10px;padding:7px 11px;border-radius:8px;background:var(--panel);margin-bottom:5px;flex-wrap:wrap}
  .roln .rp{font-weight:700;color:var(--txt);font-size:12.5px;min-width:90px}
  .roln .rs{font-family:'Spline Sans Mono';font-size:11.5px;color:var(--teal);flex:1;min-width:0}
  .pRoaster{background:rgba(34,193,195,.16);color:var(--teal)}
  /* pulsing jobchange-soon badge on dashboard machine tiles */
  .jc-pulse{display:inline-flex;align-items:center;justify-content:center;font-size:12px;margin-left:6px;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#1a1206;box-shadow:0 0 0 0 rgba(245,166,35,.7);animation:jcpulse 1.25s ease-out infinite;cursor:help;vertical-align:middle}
  .jc-pulse.trial{background:var(--blue);color:#06121f}
  @keyframes jcpulse{0%{box-shadow:0 0 0 0 rgba(245,166,35,.65);transform:scale(1)}60%{box-shadow:0 0 0 9px rgba(245,166,35,0);transform:scale(1.12)}100%{box-shadow:0 0 0 0 rgba(245,166,35,0);transform:scale(1)}}
  .info{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;border:1.5px solid var(--txt3);color:var(--txt3);font-size:10px;font-weight:700;font-style:italic;font-family:Georgia,'Times New Roman',serif;cursor:pointer;margin-left:6px;vertical-align:middle;line-height:1;user-select:none;transition:.15s;flex:none}
  .info:hover{border-color:var(--accent);color:var(--accent);background:rgba(245,166,35,.1)}
  .infopop-back{position:fixed;inset:0;z-index:199;background:transparent}
  .infopop{position:fixed;z-index:200;max-width:300px;background:var(--panel);border:1px solid var(--line2);border-radius:11px;box-shadow:0 14px 44px rgba(0,0,0,.55);padding:12px 14px;font-size:12.5px;line-height:1.6;color:var(--txt2);animation:popfx .14s ease-out}
  .infopop b{color:var(--txt)} .infopop code{background:var(--panel2);padding:1px 5px;border-radius:5px;font-size:11px}
  @keyframes popfx{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  /* ============ DENAH / WORKSHOP FLOOR PLAN ============ */
  .stockviews{display:inline-flex;gap:4px;background:var(--panel2);border:1px solid var(--line2);border-radius:11px;padding:3px}
  .stockviews button{background:none;border:none;color:var(--txt2);font-family:inherit;font-size:12px;font-weight:700;padding:7px 14px;border-radius:8px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px}
  .stockviews button.on{background:var(--accent);color:#1a1205;box-shadow:0 2px 8px rgba(245,166,35,.35)}
  .denah-wrap{position:relative;margin-top:6px}
  .denah-stage{position:relative;width:100%;border:1px solid var(--line2);border-radius:14px;overflow:hidden;background:var(--panel) repeating-linear-gradient(45deg,transparent,transparent 11px,rgba(255,255,255,.012) 11px,rgba(255,255,255,.012) 22px);touch-action:pan-y;user-select:none;-webkit-user-select:none}
  .denah-stage.editing{cursor:crosshair;outline:2px dashed var(--accent);outline-offset:-2px;touch-action:none}
  .denah-stage img{display:block;width:100%;height:auto;pointer-events:none;-webkit-user-drag:none;transform-origin:0 0;will-change:transform;transition:transform .08s linear}
  /* zoom & pan layer — gambar (in-flow, penentu tinggi) + lapisan penanda di-transform bersamaan */
  .denah-stage.zoomed{touch-action:none}
  .denah-stage.zoomed.panning{cursor:grabbing}
  .denah-pan{position:absolute;inset:0;transform-origin:0 0;will-change:transform;transition:transform .08s linear;pointer-events:none}
  .denah-pan .denah-marker{pointer-events:auto}
  .denah-stage img.notrans,.denah-pan.notrans{transition:none}
  .denah-zoomctl{position:absolute;right:10px;bottom:10px;z-index:6;display:flex;flex-direction:column;gap:6px}
  .denah-zoomctl button{width:38px;height:38px;border-radius:11px;background:rgba(12,19,32,.86);backdrop-filter:blur(6px);border:1px solid var(--line2);color:var(--txt);font-size:19px;font-weight:800;cursor:pointer;display:grid;place-items:center;line-height:1;box-shadow:0 4px 14px rgba(0,0,0,.45);transition:.15s}
  .denah-zoomctl button:hover{border-color:var(--accent);color:var(--accent2)}
  .denah-zoomctl button:active{transform:scale(.92)}
  .denah-zoomctl .zlvl{font-family:'Spline Sans Mono';font-size:10px;font-weight:700;color:var(--txt2);text-align:center;background:rgba(12,19,32,.86);border:1px solid var(--line2);border-radius:9px;padding:3px 0}
  .denah-empty{display:grid;place-items:center;min-height:300px;padding:30px;text-align:center;color:var(--txt3)}
  .denah-empty .big{font-size:46px;margin-bottom:8px}
  .denah-marker{position:absolute;transform:translate(-50%,-100%);transform-origin:50% 100%;z-index:3;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:0;filter:drop-shadow(0 4px 8px rgba(0,0,0,.55))}
  .denah-marker .pin{display:flex;align-items:center;gap:6px;background:var(--panel2);border:1.5px solid var(--accent);color:var(--txt);font-size:11.5px;font-weight:800;padding:5px 10px;border-radius:13px;white-space:nowrap;line-height:1.1;max-width:46vw;overflow:hidden;text-overflow:ellipsis}
  .denah-marker .pin .qty{font-family:'Spline Sans Mono';font-size:11px;font-weight:700;background:var(--accent);color:#1a1205;border-radius:9px;padding:0 6px;min-width:18px;text-align:center}
  .denah-marker.low .pin{border-color:var(--red)}
  .denah-marker.low .pin .qty{background:var(--red);color:#fff}
  .denah-marker.empty .pin{border-color:var(--line2);color:var(--txt3)}
  .denah-marker.empty .pin .qty{background:var(--line2);color:var(--txt2)}
  .denah-marker::after{content:'';width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid var(--accent);margin-top:-1px}
  .denah-marker.low::after{border-top-color:var(--red)}
  .denah-marker.empty::after{border-top-color:var(--line2)}
  .denah-stage.editing .denah-marker{cursor:grab}
  .denah-stage.editing .denah-marker:active{cursor:grabbing}
  .denah-marker.dragging{z-index:9;opacity:.92}
  .denah-hint{font-size:11.5px;color:var(--txt3);margin-top:8px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .denah-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
  /* rack stock panel (bottom sheet on mobile, dialog on desktop) */
  .rackpanel{position:fixed;inset:0;z-index:128;display:none;align-items:flex-end;justify-content:center;background:rgba(4,8,16,.6);backdrop-filter:blur(2px)}
  .rackpanel.show{display:flex}
  .rackbox{background:var(--bg2);border:1px solid var(--line2);border-top-left-radius:18px;border-top-right-radius:18px;width:100%;max-width:560px;max-height:82vh;overflow:auto;padding:18px 18px 24px;box-shadow:0 -16px 50px rgba(0,0,0,.6);animation:sheetUp .25s ease}
  @keyframes sheetUp{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
  @media(min-width:1001px){.rackpanel{align-items:center}.rackbox{border-radius:18px;max-height:80vh}}
  .rackbox .rh{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .rackbox .rh b{font-size:17px}
  .rackitem{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;background:var(--panel);border:1px solid var(--line);margin-bottom:7px}
  .rackitem .ri-main{flex:1 1 auto;min-width:0}
  .rackitem .ri-main .nm{font-weight:700;font-size:13px}
  .rackitem .ri-main .sz{font-size:11px;color:var(--txt3);font-family:'Spline Sans Mono'}
  .rackitem.low{border-color:var(--red)}
  .qtybtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line2);background:var(--panel2);color:var(--txt);font-size:16px;font-weight:800;cursor:pointer;flex:0 0 auto;line-height:1}
  .qtybtn:hover{border-color:var(--accent);color:var(--accent2)}
  .rackitem .qv{min-width:34px;text-align:center;font-family:'Spline Sans Mono';font-weight:800;font-size:14px}

  /* ===================== MOBILE POLISH & MOTION DISCIPLINE ===================== */
  /* buang kotak abu-abu bawaan saat ketuk di mobile; kita pakai feedback sendiri */
  *{-webkit-tap-highlight-color:transparent}

  /* umpan-balik sentuh — di perangkat sentuh :hover tak pernah aktif, jadi tap terasa mati */
  @media(hover:none){
    .fab{opacity:1}
    .fab:active{filter:brightness(1.12)}
    .kpi-click,.fabmenu-item,.spectab,.fchip,.btn,.bellbtn,.mcl.clk,
    .di,.bp-row,.al-row,.qtybtn,.filt-btn,.ico-btn,.x{
      transition:transform .12s ease,filter .12s ease,background .12s ease}
    .kpi-click:active,.fabmenu-item:active,.fchip:active,.btn:active,
    .bellbtn:active,.mcl.clk:active,.qtybtn:active,.filt-btn:active,.ico-btn:active,.x:active{
      transform:scale(.96);filter:brightness(1.08)}
    .spectab:not(.off):active{transform:scale(.96);filter:brightness(1.08)}
    .di:active,.bp-row:active,.al-row:active{background:rgba(245,166,35,.10)}
    nav button:active{transform:scale(.93)}
    .kpi-click:active{border-color:var(--c)}
  }

  /* tab aktif: ikon sedikit terangkat — penanda navigasi lebih jelas & modern */
  nav button .ic2{transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
  nav button.on .ic2{transform:translateY(-2px) scale(1.1)}

  /* gulir di dalam sheet/drawer tidak bocor menggulung latar di belakang */
  .mscroll,.drawer .dlist,.bellpop,.rackbox{overscroll-behavior:contain}
  /* tabel punya scroll-x sendiri; biarkan swipe vertikal diteruskan ke parent (jangan dikurung) */
  .tblwrap{overscroll-behavior-x:contain;touch-action:pan-x pan-y}

  @media print{
    body, body.light{ --bg:#fff;--bg2:#fff;--panel:#fff;--panel2:#f4f6fa;--line:#dde3ec;--line2:#cdd6e2;--txt:#13203a;--txt2:#3a4a63;--txt3:#71839c;--hbg:#fff; background:#fff!important; }
    nav,header,.fab,.fabmenu,.fabmenuBack,.drawer,.backdrop,.mmodal,.cmodal{ display:none!important }
    .report-tools{ display:none!important }
    #main{ padding:6px!important;margin:0!important }
    .card{ break-inside:avoid;box-shadow:none!important;border:1px solid #d8dee8!important }
    *{ -webkit-print-color-adjust:exact;print-color-adjust:exact }
    @page{ margin:12mm }
  }
  /* ============================================================
     iOS 26 “Liquid Glass” — permukaan transparan berefek kaca buram
     Berlaku untuk tema Gelap & Terang. Ditaruh paling akhir agar menimpa.
     ============================================================ */
  :root{
    --glass:rgba(23,35,56,.55);
    --glass-strong:rgba(18,28,46,.7);
    --glass-brd:rgba(255,255,255,.12);
    --glass-hi:rgba(255,255,255,.22);
    --glass-blur:saturate(180%) blur(22px);
    --radius:20px;
  }
  body.light{
    --glass:rgba(255,255,255,.6);
    --glass-strong:rgba(255,255,255,.72);
    --glass-brd:rgba(255,255,255,.6);
    --glass-hi:rgba(255,255,255,.9);
  }
  /* efek kaca pada chrome & kontainer */
  header, nav, .card, .drawer, .mbox, .cbox, .bellpop, .rackbox, .mnav, .fabmenu .fmi{
    -webkit-backdrop-filter:var(--glass-blur);
    backdrop-filter:var(--glass-blur);
  }
  .card{
    background:var(--glass)!important;
    border:1px solid var(--glass-brd)!important;
    border-radius:var(--radius)!important;
    box-shadow:0 1px 0 var(--glass-hi) inset, 0 10px 30px rgba(0,0,0,.26)!important;
  }
  header{
    background:var(--glass)!important;
    box-shadow:0 1px 0 var(--glass-hi) inset, 0 8px 26px rgba(0,0,0,.20);
  }
  nav{ background:var(--glass)!important; box-shadow:0 1px 0 var(--glass-hi) inset, 0 10px 30px rgba(0,0,0,.4); }
  .drawer{ background:var(--glass-strong)!important; border-right:1px solid var(--glass-brd)!important; }
  .mbox, .cbox, .bellpop, .rackbox{
    background:var(--glass-strong)!important;
    border:1px solid var(--glass-brd)!important;
    border-radius:var(--radius)!important;
    box-shadow:0 1px 0 var(--glass-hi) inset, 0 28px 80px rgba(0,0,0,.5)!important;
  }
  .mnav{ background:var(--glass-strong)!important; border:1px solid var(--glass-hi)!important; }
  /* tombol — pil & sedikit kaca */
  .themebtn{ border-radius:13px; background:var(--glass); border:1px solid var(--glass-brd);
    -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur); }
  .accentbtn, .fsbtn{ border-radius:13px; }
  .fab{ border:1px solid var(--glass-hi); }
  /* sorotan tepi atas tipis ala kaca pada kartu */
  .tblwrap{ border-radius:14px; }
</style>

<body>
<div id="bootErr" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a1620;color:#ff9a9a;border-bottom:1px solid #ff5a5a;padding:10px 14px;font:600 12.5px Archivo,sans-serif"></div>

/* ===== Equipment areas. Tiap area punya MODE + GROUPS [{name, parts:[...]}]:
   - 'section' : groups = klasifikasi PM (PM1, PM2...) → tiap grup dirender matriks per-section (S1..Sn)
   - 'grouped' : groups = mekanisme/"bab"            → tiap grup dirender kartu (tanpa section)
===== */
const PART_AREAS=['Feeder Equipment','Section Equipment','Ware Handling Equipment'];
const AREA_DEFAULT_MODE={'Feeder Equipment':'grouped','Section Equipment':'section','Ware Handling Equipment':'grouped'};
function areaListAll(){ var ks=PART_AREAS.slice(); Object.keys(CFG.partAreas||{}).forEach(function(a){ if(ks.indexOf(a)<0)ks.push(a); }); return ks; }
function areaDef(area){ var d=CFG.partAreas&&CFG.partAreas[area]; return (d&&typeof d==='object'&&!Array.isArray(d))?d:null; }
function areaModeOf(area){ var d=areaDef(area); return (d&&d.mode==='grouped')?'grouped':'section'; }
function areaGroupsOf(area){ var d=areaDef(area); return (d&&Array.isArray(d.groups))?d.groups:[]; }
function areaPartsFlat(area){ var d=areaDef(area); if(!d)return []; var out=[]; if(Array.isArray(d.groups)){ d.groups.forEach(function(g){ (g.parts||[]).forEach(function(p){ if(p&&out.indexOf(p)<0)out.push(p); }); }); return out; } return (d.parts||[]).slice(); }
function partAreaOf(p){ var ks=areaListAll(); for(var i=0;i<ks.length;i++){ if(areaPartsFlat(ks[i]).indexOf(p)>=0) return ks[i]; } return null; }
function sectionParts(){ var out=[]; areaListAll().forEach(function(a){ if(areaModeOf(a)==='section') areaPartsFlat(a).forEach(function(p){ if(out.indexOf(p)<0)out.push(p); }); }); return out; }
function syncPartsFromAreas(){ if(!CFG.partAreas) return; var out=[]; areaListAll().forEach(function(a){ areaPartsFlat(a).forEach(function(p){ if(p&&out.indexOf(p)<0)out.push(p); }); }); CFG.parts=out; }
function _sectionDumpGroup(){ var d=areaDef('Section Equipment'); if(!d)return null; if(!Array.isArray(d.groups))d.groups=[]; if(!d.groups.length)d.groups.push({name:'Preventive Maintenance 1',parts:[]}); return d.groups[0]; }
function ensurePartAreas(hadAreas){
  if(!CFG.partAreas||typeof CFG.partAreas!=='object') CFG.partAreas={};
  PART_AREAS.forEach(function(a){ if(!(a in CFG.partAreas)) CFG.partAreas[a]={mode:(AREA_DEFAULT_MODE[a]||'section'),groups:[]}; });
  Object.keys(CFG.partAreas).forEach(function(a){
    var d=CFG.partAreas[a]; var mode=AREA_DEFAULT_MODE[a]||'section';
    var defName=(mode==='grouped')?'Mekanisme 1':'Preventive Maintenance 1';
    if(Array.isArray(d)){   // format LAMA (array datar) → konversi ke groups
      CFG.partAreas[a]={mode:mode,groups:(d.length?[{name:defName,parts:d.slice()}]:[])};
    } else if(d&&typeof d==='object'){
      if(d.mode!=='grouped'&&d.mode!=='section') d.mode=mode;
      if(!Array.isArray(d.groups)){   // format {parts:[...]} → satu grup default
        var lp=Array.isArray(d.parts)?d.parts.slice():[];
        d.groups=lp.length?[{name:(d.mode==='grouped'?'Mekanisme 1':'Preventive Maintenance 1'),parts:lp}]:[];
      }
      if('parts' in d) delete d.parts;
      d.groups.forEach(function(g){ if(!Array.isArray(g.parts))g.parts=[]; if(typeof g.name!=='string')g.name=defName; });
    } else { CFG.partAreas[a]={mode:mode,groups:[]}; }
  });
  if(!hadAreas){ var g0=_sectionDumpGroup(); if(g0){ (CFG.parts||[]).forEach(function(p){ if(g0.parts.indexOf(p)<0)g0.parts.push(p); }); } }
  (CFG.parts||[]).forEach(function(p){ if(!partAreaOf(p)){ var g=_sectionDumpGroup(); if(g&&g.parts.indexOf(p)<0)g.parts.push(p); } });
  syncPartsFromAreas();
}

/* ============ REASON ↔ PART CLASSIFICATION ============ */
function isCommonReason(r){ return (CFG.commonReasons||[]).some(x=>x.toLowerCase()===String(r||'').trim().toLowerCase()); }
// Hitung reason aktual per part dari DB: {part:{reason:count}}
function partReasonStats(){ const m={}; DB.forEach(r=>{ const p=r.part, rs=String(r.reason||'').trim(); if(!p||!rs)return; m[p]=m[p]||{}; m[p][rs]=(m[p][rs]||0)+1; }); return m; }
// Bangun daftar reason yang diizinkan per part dari data. merge=true → gabung dgn yang sudah ada (tidak menghapus tambahan manual)
function analyzePartReasons(merge){ const stats=partReasonStats(); if(!CFG.partReasons||typeof CFG.partReasons!=='object')CFG.partReasons={};
  Object.keys(stats).forEach(p=>{ const cur=merge?(CFG.partReasons[p]||[]).slice():[];
    Object.keys(stats[p]).sort((a,b)=>stats[p][b]-stats[p][a]).forEach(rs=>{ if(isCommonReason(rs))return; if(!cur.some(x=>x.toLowerCase()===rs.toLowerCase()))cur.push(rs); });
    CFG.partReasons[p]=cur; }); }
// Reason yang ditawarkan saat input, berdasarkan part yang dipilih (gabungan), + reason umum
function reasonsForParts(parts){ const out=[]; const push=v=>{ if(v&&!out.some(x=>x.toLowerCase()===v.toLowerCase()))out.push(v); };
  (CFG.commonReasons||[]).forEach(push);
  (parts||[]).forEach(p=>(CFG.partReasons[p]||[]).forEach(push));
  if(!parts||!parts.length) CFG.reasons.forEach(push);   // belum pilih part → tampilkan semua sbg fallback
  return out; }

function markDirty(){ Cloud.dirty=true; try{localStorage.setItem('pm_dirty','1');}catch(e){} }
function clearDirty(){ Cloud.dirty=false; try{localStorage.setItem('pm_dirty','0');}catch(e){} }

// Simpan nomor revisi cloud terakhir yang sudah kita serap, supaya BERTAHAN setelah reload / tutup-buka aplikasi.
function persistRev(r){ try{ if(r!=null) localStorage.setItem('pm_lastrev', String(r)); }catch(e){} }
function storedRevGet(){ var v=parseInt(localStorage.getItem('pm_lastrev'),10); return isNaN(v)?-1:v; }
/* REKONSILIASI SAAT BUKA — dijalankan sekali tiap aplikasi dibuka, SEBELUM polling biasa.
   Tujuannya menyembuhkan kasus: perangkat ini punya flag "dirty" sisa sesi lama (mis. di HP aplikasi
   ditutup sebelum sinkron selesai), sehingga polling biasa menolak menarik data & malah menimpa cloud
   dengan data lama. Karena data tidak diedit di dua perangkat secara bersamaan, bila revisi cloud LEBIH
   BARU dari yang terakhir kita serap, versi cloud-lah yang sah dan kita tarik. */
function gsStartupSync(){ if(!Cloud.enabled||!Cloud.url) return;
  gsJsonp({action:'rev', room:Cloud.room, secret:Cloud.secret||''}, (err,j)=>{
    if(err||!j||!j.ok){ return; }   // biarkan polling normal yang mencoba lagi
    Cloud.connected=true; Cloud.err=''; if(Cloud.status!=='error') Cloud.status='connected';
    var sRev=storedRevGet();
    var cloudAhead = (j.exists && (+j.rev)>0 && (+j.rev) > sRev);
    if(cloudAhead){
      // Cloud lebih baru → tarik & timpa data lokal lama. Buang flag dirty sisa (sudah usang vs cloud).
      clearDirty(); Cloud.pending=null; Cloud.pendingSince=0; Cloud.lastRev=null;
      gsFullPull();
    } else if(Cloud.dirty){
      // Tidak ada versi cloud lebih baru, tapi ada input lokal belum terkirim → kirim sekarang.
      gsPush(true);
    } else {
      Cloud.lastRev=(+j.rev); persistRev(+j.rev);
    }
    if(!cloudBusy()) render&&render();
  });
}
function cloudStatusLabel(){ if(!Cloud.enabled) return '⚪ nonaktif'; if(Cloud.status==='error') return '🔴 gagal: '+(Cloud.err||'cek config'); if(Cloud.dirty||Cloud.pending) return '🟡 menyimpan ke cloud…'; if(Cloud.status==='connected') return '🟢 tersinkron — data dibagikan'; if(Cloud.status==='connecting') return '🟡 menyambung…'; return '⚪ nonaktif'; }
// Cloud-check icon, colored by sync status: green=updated, red=error, white/neutral=other
function cloudIcon(extra){
  let st = (Cloud && Cloud.enabled) ? (Cloud.status||'off') : 'off';
  if(Cloud.enabled && (Cloud.dirty||Cloud.pending) && st!=='error') st='connecting';   // belum terkonfirmasi → jangan hijau
  let lbl;
  if(st==='connected') lbl='🟢 Tersinkron — data sudah ter-update di cloud';
  else if(st==='error') lbl='🔴 Sinkronisasi gagal — '+(Cloud.err||'cek koneksi / Settings');
  else if(st==='connecting') lbl=(Cloud.dirty||Cloud.pending)?'🟡 Menyimpan ke cloud… (data sudah aman di perangkat)':'⚪ Menyambung ke cloud…';
  else lbl='⚪ Lokal — cloud sync nonaktif (data tersimpan di perangkat)';
  const title = lbl + (extra?(' · '+extra):'');
  return `<span class="synced cl-${st}" title="${esc(title)}">${ICON_CLOUDCHECK}</span>`;
}
function gsJsonp(params, cb){
  if(!Cloud.url){ cb(new Error('URL empty')); return; }
  const id='__pmcb'+(++_jsonpN);
  const s=document.createElement('script');
  let done=false; const finish=(err,data)=>{ if(done)return; done=true; try{delete window[id];}catch(_){ window[id]=undefined; } try{s.remove();}catch(_){ } cb(err,data); };
  window[id]=function(data){ finish(null,data); };
  s.onerror=function(){ finish(new Error('tidak bisa memuat URL (cek URL benar & deploy = Anyone)')); };
  setTimeout(()=>finish(new Error('timeout — server tidak menjawab')), 15000);
  const q=Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');
  s.src=Cloud.url+'?'+q+'&callback='+id+'&_t='+Date.now();
  document.body.appendChild(s);
}
function gsConnect(cfg){
  if(!cfg||!cfg.url){ Cloud.status='error'; Cloud.err='Web App URL is empty'; render&&render(); return; }
  Cloud.url=cfg.url; Cloud.room=(cfg.room||'pmdata'); Cloud.secret=cfg.secret||''; Cloud.poll=Math.max(5,(+cfg.poll||12)); Cloud.enabled=true; Cloud.status='connecting'; render&&render();
  gsStartupSync(); clearInterval(Cloud._pollTimer); Cloud._pollTimer=setInterval(gsPoll, Cloud.poll*1000);
}
function cloudBusy(){
  const ids=['cmodal','jcmodal','mmodal']; for(let i=0;i<ids.length;i++){ const el=document.getElementById(ids[i]); if(el&&el.classList&&el.classList.contains('show')) return true; }
  const a=document.activeElement; if(a&&/^(INPUT|TEXTAREA|SELECT)$/.test(a.tagName||'')) return true;
  return false;
}
function gsPoll(){ if(!Cloud.enabled||!Cloud.url) return;
  // CEK RINGAN: hanya nomor revisi + token (~80 byte), TIDAK mengunduh seluruh data
  gsJsonp({action:'rev', room:Cloud.room, secret:Cloud.secret||''}, (err,j)=>{
    if(err){ Cloud.status='error'; Cloud.connected=false; Cloud.err=err.message; if(!cloudBusy())render&&render(); return; }
    if(!j||!j.ok){ Cloud.status='error'; Cloud.connected=false; Cloud.err=(j&&j.error)||'akses ditolak'; if(!cloudBusy())render&&render(); return; }
    Cloud.connected=true; Cloud.err=''; if(Cloud.status==='error'||Cloud.status==='connecting') Cloud.status='connected';
    // (1) KONFIRMASI: token kita sudah mendarat di server? (tanpa unduh data)
    if(Cloud.pending && j.w===Cloud.pending){
      Cloud.confirmedToken=Cloud.pending; Cloud.pending=null; Cloud.pendingSince=0; Cloud.lastRev=j.rev; persistRev(j.rev);
      clearDirty(); Cloud.status='connected'; if(!cloudBusy())render&&render(); return;
    }
    // (2) server kosong → kirim data kita
    if(!j.exists || j.rev===0){
      if(!Cloud.pending || Date.now()-Cloud.pendingSince>15000) gsPush();
      return;
    }
    // (3) ada perubahan lokal belum terkonfirmasi → lindungi, kirim ulang bila stale
    if(Cloud.dirty){
      const stale = !Cloud.pending || (Date.now()-Cloud.pendingSince > Math.max(12000, Cloud.poll*1500));
      if(stale) gsPush();
      return;
    }
    // (4) revisi berubah & bukan tulisan kita → BARU unduh data penuh
    if(j.rev!==Cloud.lastRev && j.w!==Cloud.confirmedToken){
      if(cloudBusy()) return;
      gsFullPull();
    } else { Cloud.lastRev=j.rev; persistRev(j.rev); }
  });
}
// Unduh data PENUH (hanya dipanggil saat rev berubah / tarik manual)
function gsFullPull(){ if(!Cloud.enabled||!Cloud.url) return;
  gsJsonp({action:'get', room:Cloud.room, secret:Cloud.secret||''}, (err,j)=>{
    if(err||!j||!j.ok||!j.data) return;
    if(Cloud.dirty) return;            // jangan timpa perubahan lokal belum tersinkron
    if(cloudBusy()) return;
    Cloud.lastRev=j.rev; persistRev(j.rev); cloudApply(j.data);
  });
}
/* Buat hidden iframe + form sekali pakai untuk POST yang bebas CORS dari origin manapun */
function _ensureSyncForm(){
  if(!document.getElementById('__syncIfr')){
    const ifr=document.createElement('iframe'); ifr.id='__syncIfr'; ifr.name='__syncIfr';
    ifr.style.cssText='display:none!important;width:0;height:0;position:absolute;top:-9999px;left:-9999px;border:0';
    document.body.appendChild(ifr);
  }
  if(!document.getElementById('__syncFrm')){
    const frm=document.createElement('form'); frm.id='__syncFrm'; frm.method='POST'; frm.target='__syncIfr';
    frm.enctype='text/plain'; frm.setAttribute('enctype','text/plain'); frm.acceptCharset='utf-8';
    frm.style.display='none';
    const inp=document.createElement('input'); inp.type='hidden'; inp.name='body'; frm.appendChild(inp);
    document.body.appendChild(frm);
  }
}
function gsPush(immediate){ if(!Cloud.enabled||!Cloud.url||Cloud.suppress) return; clearTimeout(_cloudTimer);
  const doWrite=()=>{
    const token=CLIENT_ID+':'+Date.now(); Cloud.pending=token; Cloud.pendingSince=Date.now(); Cloud.lastToken=token; markDirty();
    if(Cloud.status!=='error') Cloud.status='connected'; if(!cloudBusy()) render&&render();
    const payload=JSON.stringify({ action:'set', room:Cloud.room, secret:Cloud.secret||'', w:token,
      data:{ db:DB, cfg:CFG, actions:actionStatus, jc:JCPLANS, stock:STOCK } });
    // ── Metode 1: Hidden form POST — bebas CORS, bekerja dari file:// maupun http/https, aman untuk data besar
    try{
      _ensureSyncForm();
      const frm=document.getElementById('__syncFrm');
      frm.action=Cloud.url; frm.querySelector('input[name=body]').value=payload;
      frm.submit();
      setTimeout(gsPoll, 2000);   // tunggu server proses sebelum konfirmasi
    } catch(fe){
      // ── Fallback: fetch no-cors bila form gagal (edge case)
      fetch(Cloud.url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:payload})
        .then(()=>{ setTimeout(gsPoll,1200); })
        .catch(e=>{ Cloud.status='error'; Cloud.err='gagal kirim: '+e.message; if(!cloudBusy())render&&render(); });
    }
  };
  if(immediate) doWrite(); else _cloudTimer=setTimeout(doWrite, 800);
}
function cloudApply(data){ if(Cloud.dirty) return;   // ada perubahan lokal belum terkonfirmasi → jangan timpa
  Cloud.suppress=true;
  try{
    if(Array.isArray(data.db)) DB=data.db;
    if(data.cfg) CFG=Object.assign(JSON.parse(JSON.stringify(DEFAULT_CFG)),data.cfg);
    if(data.cfg) ensurePartAreas(!!(data.cfg.partAreas&&typeof data.cfg.partAreas==='object'));
    if(data.actions) actionStatus=data.actions;
    if(Array.isArray(data.jc)) JCPLANS=data.jc;
    if(Array.isArray(data.stock)) STOCK=data.stock;
    if(!CFG.machineSecs||typeof CFG.machineSecs!=='object') CFG.machineSecs={};
    if(!CFG.commonReasons||!CFG.commonReasons.length) CFG.commonReasons=['JobChange','Roaster'];
    if(!CFG.partReasons||typeof CFG.partReasons!=='object') CFG.partReasons={};
    if(Object.keys(CFG.partReasons).length===0) analyzePartReasons(true);
  }catch(e){}
  try{ saveLocal(); }catch(e){}
  clearDirty(); Cloud.pending=null; Cloud.suppress=false;
  try{ buildNav&&buildNav(); }catch(e){}

/* ============ COMPUTE ENGINE ============ */
function classifyCat(reason){
  if(!reason||!reason.trim()) return 'Trouble';
  const s=reason.trim().toLowerCase();
  if(s==='jobchange'||s==='roaster') return 'Scheduled';
  if(s.includes('emergency')) return 'Emergency';
  return 'Trouble';
}
function lifetimeOf(part){ return CFG.lifetimes[part]||90; }
function statusOf(rem){ if(rem<0)return'OVERDUE'; if(rem<=CFG.urgent)return'URGENT'; if(rem<=CFG.warning)return'WARNING'; return'OK'; }
function daysBetween(a,b){ return Math.round((b-a)/86400000); }
function parseD(s){ const d=new Date(s+'T00:00:00'); d.setHours(0,0,0,0); return d; }
function fmtD(d){ if(!d)return'—'; const x=(d instanceof Date)?d:parseD(d); return String(x.getDate()).padStart(2,'0')+'/'+String(x.getMonth()+1).padStart(2,'0')+'/'+x.getFullYear(); }

// enrich records with category & sorted; compute actual lifetime
function enriched(){
  const list=DB.map((r,i)=>({...r,_i:i,cat:classifyCat(r.reason),lt:lifetimeOf(r.part),d:parseD(r.date)}));
  // actual lifetime = gap from previous same combo
  const groups={};
  [...list].sort((a,b)=>a.d-b.d).forEach(r=>{
    const k=r.machine+'|'+r.section+'|'+r.part;
    r.actual = groups[k]!==undefined ? daysBetween(groups[k],r.d) : null;
    groups[k]=r.d;
  });
  return list;
}
// monitoring: latest per machine|section|part combo (only combos that exist in data)
function monitoring(){
  const list=enriched(); const combo={};
  list.forEach(r=>{
    const k=r.machine+'|'+r.section+'|'+r.part;
    if(!combo[k]||r.d>combo[k].last){ combo[k]=combo[k]||{machine:r.machine,section:r.section,part:r.part,count:0,trouble:0}; }
  });
  // recompute counts & last
  Object.keys(combo).forEach(k=>{combo[k].count=0;combo[k].trouble=0;combo[k].last=null;});
  list.forEach(r=>{
    const k=r.machine+'|'+r.section+'|'+r.part; const o=combo[k];
    o.count++; if(r.cat==='Trouble')o.trouble++;
    if(!o.last||r.d>o.last)o.last=r.d;
  });
  return Object.values(combo).map(o=>{
    const lt=lifetimeOf(o.part); const nd=new Date(o.last.getTime()+lt*86400000);
    const rem=daysBetween(TODAY,nd); const st=statusOf(rem);
    return {...o,lt,nextDue:nd,rem,status:st,key:o.machine+'|'+o.section+'|'+o.part};
  }).sort((a,b)=>a.rem-b.rem);
}

function upcomingJCList(horizon){ horizon=(horizon!=null?horizon:(CFG.jcAlertDays!=null?CFG.jcAlertDays:7));
  return (JCPLANS||[]).filter(p=>p&&p.jcDate)
    .map(p=>({p,rem:daysBetween(TODAY,parseD(p.jcDate))}))
    .filter(x=>x.rem>=0 && x.rem<=horizon)
    .sort((a,b)=>(a.p.jcDate||'').localeCompare(b.p.jcDate||'')||String(a.p.machine||'').localeCompare(String(b.p.machine||'')));
}
function jcStatusTag(p){
  const machine=p.machine||p.line;
  // baseline = plan terbaru SEBELUM plan ini (samakan dgn 'Sekarang' di popup)
  const base=(JCPLANS||[]).filter(q=>q&&(q.machine||q.line)===machine&&q.id!==p.id&&(q.jcDate||'')<=(p.jcDate||''))
    .sort((a,b)=>(b.jcDate||'').localeCompare(a.jcDate||'')||((b.id||0)-(a.id||0)))[0]||null;
  const diff=(typeof transitionDiff==='function')?transitionDiff(base,p):[];
  const changed=diff.filter(d=>d.status!=='same');
  const roaster=Array.isArray(p.roasterPlan)&&p.roasterPlan.length>0;
  const isTrial=p.trial||/trial/i.test(p.notes||'');
  let main;
  if(isTrial){ main={t:'TRIAL',c:'var(--yellow)'}; }
  else if(changed.length){
    const cru=[];
    if(diff.some(d=>d.part==='Orifice'&&d.status!=='same')) cru.push('Orifice');
    if(diff.some(d=>String(d.part).indexOf('Holder')===0&&d.status!=='same')) cru.push('Holder');
    main={t:'GANTI'+(cru.length?' · '+cru.join(', '):''),c:'var(--green)'};
  } else { main={t:'TETAP',c:'var(--txt2)'}; }
  return {main,roaster};
}
function jcRemColor(rem){ return rem<=0?'var(--red)':rem<=2?'var(--orange)':rem<=4?'var(--yellow)':'var(--green)'; }
function jcRemTxt(rem){ return rem===0?'HARI INI':rem===1?'BESOK':rem+' hari lagi'; }
function jcDayName(date){ try{ return parseD(date).toLocaleDateString('id-ID',{weekday:'long'}); }catch(e){ return ''; } }

/* ---- AVG LIFETIME PART PER MACHINE (klik kartu Avg Lifetime di dashboard) ---- */
function avgLifePerMachine(){
  const en=enriched(); const map={};
  CFG.machines.forEach(mc=>{ const o={}; CFG.parts.forEach(p=>o[p]={vals:[],lt:lifetimeOf(p)}); map[mc]=o; });
  en.forEach(r=>{ if(r.actual!=null && map[r.machine] && map[r.machine][r.part]) map[r.machine][r.part].vals.push(r.actual); });
  return map;
}
function _alpStatus(a,lt){ return a==null?'—':a<lt*0.7?'CRITICAL':a<lt?'UNDER TARGET':'ON TARGET'; }
function _alpColor(st){ return st==='CRITICAL'?'#ff5a5a':st==='UNDER TARGET'?'#ff8c3b':st==='ON TARGET'?'#3fd77a':'#64789a'; }

  let sel=window._alpMc||'__all';

  const partRows=(mc)=>CFG.parts.map(p=>{const s=map[mc][p];const a=avg(s.vals);const ach=a!=null?a/s.lt*100:null;const st=_alpStatus(a,s.lt);

/* draws % labels OUTSIDE a pie with leader lines + arrowheads */
const pieOutLabels={

    const ds=chart.data.datasets[0]; const total=ds.data.reduce((a,b)=>a+(+b||0),0); if(!total)return;
    const lt=document.body.classList.contains('light'); const txtcol=lt?'#1a2435':'#eef3fb';
    const ctx=chart.ctx; ctx.save(); ctx.font='700 12px Archivo,sans-serif';
    meta.data.forEach((arc,i)=>{
      const val=+ds.data[i]||0; if(val<=0)return;
      const pct=Math.round(val/total*100); if(pct<1)return;
      const ang=(arc.startAngle+arc.endAngle)/2, r=arc.outerRadius, cx=arc.x, cy=arc.y;
      const x1=cx+Math.cos(ang)*r, y1=cy+Math.sin(ang)*r;
      const x2=cx+Math.cos(ang)*(r+13), y2=cy+Math.sin(ang)*(r+13);
      const right=Math.cos(ang)>=0, x3=x2+(right?15:-15);
      const col=(ds.backgroundColor&&ds.backgroundColor[i])||txtcol;
      ctx.strokeStyle=col; ctx.lineWidth=1.6; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y2); ctx.stroke();
      // arrowhead at the slice edge pointing inward

      ctx.beginPath(); ctx.moveTo(x1,y1);

      ctx.lineTo(x1+Math.cos(a+0.45)*ah, y1+Math.sin(a+0.45)*ah);
      ctx.closePath(); ctx.fillStyle=col; ctx.fill();
      ctx.textAlign=right?'left':'right'; ctx.textBaseline='middle'; ctx.fillStyle=txtcol;
      ctx.fillText(pct+'%', x3+(right?4:-4), y2);
    });
    ctx.restore();
  }
};

/* ---- roaster plan → real records integration ---- */
// Reconcile DB roaster records to match an APPLIED plan (handles add / remove / machine&date change)
function syncRoasterPlan(plan){
  if(!plan||!plan.roasterApplied) return {added:0,removed:0};
  const machine=plan.machine||plan.line, date=plan.jcDate, shift=plan.shift||'';
  const desired=new Set();
  (plan.roasterPlan||[]).forEach(r=>(r.sections||[]).forEach(s=>desired.add(s+'\u0001'+r.part)));
  let added=0,removed=0;
  // adopt legacy untagged roaster records that match this plan (so we can manage them)
  DB.forEach(r=>{ if(r._jc==null && r.reason==='Roaster' && r.machine===machine && r.date===date && desired.has(r.section+'\u0001'+r.part)) r._jc=plan.id; });
  // remove records owned by this plan that are no longer desired (covers removed rows & machine/date edits)
  for(let i=DB.length-1;i>=0;i--){ const r=DB[i];
    if(r._jc===plan.id && !(r.machine===machine && r.date===date && desired.has(r.section+'\u0001'+r.part))){ DB.splice(i,1); removed++; } }
  // add desired records that don't exist yet
  desired.forEach(k=>{ const idx=k.indexOf('\u0001'); const section=k.slice(0,idx), part=k.slice(idx+1);
    const ex=DB.find(x=>x.machine===machine&&x.section===section&&x.part===part&&x.date===date);
    if(ex){ if(ex.reason==='Roaster'&&ex._jc==null) ex._jc=plan.id; }   // adopt matching, leave manual records untouched
    else { DB.push({date,machine,section,part,reason:'Roaster',pic:shift,_jc:plan.id}); added++; } });
  return {added,removed};
}
function applyRoasterPlan(id){
  const p=JCPLANS.find(x=>x.id===id); if(!p){toast('Plan not found',1);return;}
  if(p.roasterApplied){toast('This roaster plan is already logged',1);return;}
  const rows=p.roasterPlan||[]; if(!rows.length){toast('No roaster parts in this plan',1);return;}
  const date=p.jcDate, shift=(p.shift||'');
  if(!confirm('Catat seluruh roaster plan ini sebagai record nyata pada '+fmtD(parseD(date))+'?\nReason "Roaster"'+(shift?', shift '+shift:'')+'.'))return;
  p.roasterApplied=true; const res=syncRoasterPlan(p);
  saveAll(); buildNav();
  toast('✓ '+res.added+' record roaster dicatat'); render();
}
function pendingRoasterPlans(machine){ return JCPLANS.filter(p=>(p.machine||p.line)===machine && !p.trial && !p.roasterApplied && Array.isArray(p.roasterPlan) && p.roasterPlan.length); }
// nearest JobChange plan for a machine within `days` ahead (incl. today)
function upcomingJC(machine,days){ days=days||7; let best=null,bestRem=1e9;
  JCPLANS.forEach(p=>{ if((p.machine||p.line)!==machine||!p.jcDate)return; const rem=daysBetween(TODAY,parseD(p.jcDate)); if(rem>=0&&rem<=days&&rem<bestRem){best=p;bestRem=rem;} });
  return best; }
function roasterPlanFor(machine,section,part){
  const plans=pendingRoasterPlans(machine).filter(p=>(p.roasterPlan||[]).some(r=>r.part===part && (r.sections||[]).includes(section)));
  plans.sort((a,b)=>(a.jcDate||'').localeCompare(b.jcDate||'')); return plans[0]||null;
}

function denahUpload(input){ const file=input.files&&input.files[0]; if(!file)return;
  const isSvg = /svg/i.test(file.type) || /\.svg$/i.test(file.name||'');
  if(!isSvg && !/^image\//.test(file.type)){ toast('File harus berupa gambar / SVG',1); return; }
  const setImg=url=>{ CFG.denah=CFG.denah||{img:'',racks:[]}; if(!Array.isArray(CFG.denah.racks))CFG.denah.racks=[]; CFG.denah.img=url; saveAll(); toast('✓ Denah dimuat'); render(); };
  const rd=new FileReader();
  if(isSvg){
    // SVG is vector + small: keep it as-is (sharp at any zoom, no JPEG conversion)
    rd.onload=e=>{ try{ setImg(e.target.result); }catch(err){ toast('Gagal memuat SVG',1); } };
    rd.onerror=()=>toast('Gagal membaca file',1);
    rd.readAsDataURL(file);
    return;
  }
  rd.onload=e=>{ const img=new Image();
    img.onload=()=>{ try{
        const MAX=1600; let w=img.width,h=img.height;
        if(!w||!h){ setImg(e.target.result); return; }
        if(w>MAX||h>MAX){ const sc=MAX/Math.max(w,h); w=Math.round(w*sc); h=Math.round(h*sc); }
        const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        let url; try{ url=cv.toDataURL('image/jpeg',0.82); }catch(_){ url=e.target.result; }
        setImg(url);
      }catch(err){ toast('Gagal memproses gambar',1); } };
    img.onerror=()=>toast('Gambar tidak valid',1);
    img.src=e.target.result; };
  rd.onerror=()=>toast('Gagal membaca file',1);
  rd.readAsDataURL(file);
}

/* ===== Zoom & Pan denah ===== */
var DenahZoom={scale:1,tx:0,ty:0,min:1,max:5};
function denahApplyTransform(noTrans){ const pan=document.getElementById('denahPan'), img=document.getElementById('denahImg'); if(!pan&&!img)return;
  const z=DenahZoom; const tf='translate('+z.tx+'px,'+z.ty+'px) scale('+z.scale+')';
  if(img){ img.classList.toggle('notrans',!!noTrans); img.style.transform=tf; }
  if(pan){ pan.classList.toggle('notrans',!!noTrans); pan.style.transform=tf;
    // pin tetap berukuran sama walau gambar di-zoom (lawan-skala)
    const inv=1/z.scale;
    pan.querySelectorAll('.denah-marker').forEach(mk=>{ mk.style.transform='translate(-50%,-100%) scale('+inv+')'; });
  }
  const stg=document.getElementById('denahStage'); if(stg)stg.classList.toggle('zoomed',z.scale>1.001);
  const lvl=document.getElementById('denahZlvl'); if(lvl)lvl.textContent=Math.round(z.scale*100)+'%';
}
function denahClamp(){ const z=DenahZoom, stage=document.getElementById('denahStage'); if(!stage)return;
  const w=stage.clientWidth,h=stage.clientHeight;
  const minTx=w-w*z.scale, minTy=h-h*z.scale;   // batas agar gambar tetap menutupi area
  if(z.scale<=1){ z.tx=0; z.ty=0; return; }
  z.tx=Math.min(0,Math.max(minTx,z.tx)); z.ty=Math.min(0,Math.max(minTy,z.ty));
}
function denahZoomAt(cx,cy,newScale){ const z=DenahZoom, stage=document.getElementById('denahStage'); if(!stage)return;
  newScale=Math.min(z.max,Math.max(z.min,newScale));
  const r=stage.getBoundingClientRect(); const ox=cx-r.left, oy=cy-r.top;
  // pertahankan titik (ox,oy) tetap di tempat saat skala berubah
  z.tx=ox-(ox-z.tx)*(newScale/z.scale); z.ty=oy-(oy-z.ty)*(newScale/z.scale);
  z.scale=newScale; denahClamp(); denahApplyTransform();
}
function denahZoom(dir){ const stage=document.getElementById('denahStage'); if(!stage)return;
  const r=stage.getBoundingClientRect(); const f=dir>0?1.4:1/1.4;
  denahZoomAt(r.left+r.width/2,r.top+r.height/2,DenahZoom.scale*f); }
function denahZoomReset(){ DenahZoom.scale=1;DenahZoom.tx=0;DenahZoom.ty=0; denahApplyTransform(); }
/* konversi titik layar -> persen relatif gambar, sudah memperhitungkan zoom & pan */
function denahPctFromClient(cx,cy){ const stage=document.getElementById('denahStage'); const z=DenahZoom;
  const r=stage.getBoundingClientRect();
  const ix=((cx-r.left)-z.tx)/z.scale, iy=((cy-r.top)-z.ty)/z.scale;
  return { x:Math.max(0,Math.min(100,(ix/r.width)*100)), y:Math.max(0,Math.min(100,(iy/r.height)*100)) };
}
function denahAttach(){
  const stage=document.getElementById('denahStage'); if(!stage)return;
  const editing=!!window._denahEdit;
  // pulihkan transform setelah render ulang (state zoom dipertahankan antar render)
  denahClamp(); denahApplyTransform(true);

  // ---- pinch-to-zoom + pan (berlaku di mode lihat & atur) ----
  let pts=new Map(), pinchStart=null, panStart=null, panMoved=false;
  stage.addEventListener('pointerdown',e=>{
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pts.size===2){ // mulai pinch
      const a=[...pts.values()]; pinchStart={dist:Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y),scale:DenahZoom.scale,
        cx:(a[0].x+a[1].x)/2,cy:(a[0].y+a[1].y)/2}; panStart=null;
    } else if(pts.size===1 && DenahZoom.scale>1.001 && !e.target.closest('.denah-marker')){
      panStart={x:e.clientX,y:e.clientY,tx:DenahZoom.tx,ty:DenahZoom.ty}; panMoved=false; stage.classList.add('panning');
    }
  });
  stage.addEventListener('pointermove',e=>{
    if(pts.has(e.pointerId)) pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pinchStart && pts.size>=2){ const a=[...pts.values()];
      const dist=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);
      denahZoomAt(pinchStart.cx,pinchStart.cy,pinchStart.scale*(dist/pinchStart.dist)); e.preventDefault(); return; }
    if(panStart){ DenahZoom.tx=panStart.tx+(e.clientX-panStart.x); DenahZoom.ty=panStart.ty+(e.clientY-panStart.y);
      if(Math.abs(e.clientX-panStart.x)>4||Math.abs(e.clientY-panStart.y)>4)panMoved=true;
      denahClamp(); denahApplyTransform(true); e.preventDefault(); }
  });
  function endPt(e){ pts.delete(e.pointerId);
    if(pts.size<2)pinchStart=null;
    if(pts.size===0){ panStart=null; stage.classList.remove('panning'); denahApplyTransform(); } }
  stage.addEventListener('pointerup',endPt); stage.addEventListener('pointercancel',endPt);
  // zoom dengan scroll wheel (desktop)
  stage.addEventListener('wheel',e=>{ e.preventDefault(); denahZoomAt(e.clientX,e.clientY,DenahZoom.scale*(e.deltaY<0?1.12:1/1.12)); },{passive:false});

  if(!editing){ stage.querySelectorAll('.denah-marker').forEach(mk=>{
      mk.addEventListener('click',ev=>{ if(panMoved){panMoved=false;return;} openRack(+mk.dataset.id); }); });
    return; }
  // editing: tap area kosong utk tambah rak (abaikan bila sedang pinch/pan)
  let downStage=false,sx=0,sy=0,movedStage=false;
  stage.addEventListener('pointerdown',e=>{ if(e.target.closest('.denah-marker'))return; if(pts.size>1)return; downStage=true;movedStage=false;sx=e.clientX;sy=e.clientY; });
  stage.addEventListener('pointermove',e=>{ if(downStage&&(Math.abs(e.clientX-sx)>6||Math.abs(e.clientY-sy)>6))movedStage=true; });
  stage.addEventListener('pointerup',e=>{ if(downStage&&!movedStage&&!panMoved&&pts.size===0&&!e.target.closest('.denah-marker')){
      const p=denahPctFromClient(e.clientX,e.clientY); denahAddRack(p.x,p.y);
    } downStage=false; });
  // editing: geser penanda / tap utk edit (koordinat sudah dikoreksi zoom)
  stage.querySelectorAll('.denah-marker').forEach(mk=>{ const id=+mk.dataset.id; let drag=false,moved=false,px=0,py=0;
    mk.addEventListener('pointerdown',e=>{ if(pts.size>1)return; e.stopPropagation(); drag=true;moved=false;px=e.clientX;py=e.clientY; try{mk.setPointerCapture(e.pointerId);}catch(_){ } mk.classList.add('dragging'); });
    mk.addEventListener('pointermove',e=>{ if(!drag)return; if(Math.abs(e.clientX-px)>4||Math.abs(e.clientY-py)>4)moved=true;
      const p=denahPctFromClient(e.clientX,e.clientY); mk.style.left=p.x+'%';mk.style.top=p.y+'%';mk._x=p.x;mk._y=p.y; });
    mk.addEventListener('pointerup',e=>{ if(!drag)return; drag=false; mk.classList.remove('dragging');
      if(moved){ const rk=CFG.denah.racks.find(r=>r.id===id); if(rk){ if(mk._x!=null)rk.x=Math.round(mk._x*10)/10; if(mk._y!=null)rk.y=Math.round(mk._y*10)/10; saveAll(); } }
      else { openRackEdit(id); } });
  });
}

/* ---------- JOBCHANGE TRANSITION COMPARISON ---------- */
function isConsumable(part){return (CFG.consumables||[]).some(c=>String(c).toLowerCase()===String(part).toLowerCase());}
function transitionDiff(from,to){const out=[];
  Object.keys(CFG.jcAreas).forEach(area=>{CFG.jcAreas[area].forEach(part=>{
    const o=((from&&from.specs&&from.specs[part])||'').trim(); const n=((to&&to.specs&&to.specs[part])||'').trim();
    if(!o&&!n)return;
    const status=(!o&&n)?'add':(o&&!n)?'remove':(o.toLowerCase()===n.toLowerCase())?'same':'change';
    out.push({area,part,oldV:o,newV:n,status,consumable:isConsumable(part)});
  });});
  return out;}
function setCmp(which,val){ if(which==='m'){window._cmpM=val;window._cmpFrom=null;window._cmpTo=null;} else if(which==='from')window._cmpFrom=+val; else if(which==='to')window._cmpTo=+val; render(); }
function currentPlan(machine){const t=ymd(TODAY);return JCPLANS.filter(p=>(p.machine||p.line)===machine&&!p.trial&&(p.jcDate||'')<=t).slice().sort((a,b)=>(b.jcDate||'').localeCompare(a.jcDate||''))[0]||null;}
function nextPlan(machine){const t=ymd(TODAY);return JCPLANS.filter(p=>(p.machine||p.line)===machine&&!p.trial&&(p.jcDate||'')>t).slice().sort((a,b)=>(a.jcDate||'').localeCompare(b.jcDate||''))[0]||null;}
function actTxt(d){ if(d.status==='same')return '✅ Tetap'; if(d.status==='add')return '➕ Pasang baru'+(d.consumable?' (consumable)':''); if(d.status==='remove')return d.consumable?'➖ Lepas (consumable)':'➖ Lepas → cleaning → balik stok'; return d.consumable?'🔁 Replace — use NEW (consumable)':'🔁 Ganti — lama→cleaning, pasang baru'; }
function transitionTableHTML(fromP,toP,showApply){

      const stk=((d.status==='change'||d.status==='add')&&d.newV)?(()=>{const sf=stockFor(d.part,d.newV);const q=sf.sizeTot!=null?sf.sizeTot:sf.partTot;return `<span class="mono" style="color:${q<=0?'#ff5a5a':q<=2?'#ff8c3b':'#3fd77a'};font-weight:700">${q}</span>`;})():'<span style="color:var(--txt3)">—</span>';

    +(showApply&&fromP&&fromP.id&&toP&&toP.id?`<div class="toolbar" style="margin-top:8px"><button class="btn sec" onclick="applyTransitionStock(${fromP.id},${toP.id})">📥 Apply to Stock (install new −1, reusable lepas +1)</button></div>`:'');

function applyTransitionStock(fromId,toId){

  const acts=transitionDiff(fromP,toP).filter(d=>['change','add','remove'].includes(d.status));
  if(!acts.length){toast('No changes to apply',1);return;}
  if(!confirm('Apply stock movement?\n• New size installed: stock -1\n• Reusable part removed: stock +1 (marked needs cleaning)\nRemoved consumables are not returned.'))return;
  let inst=0,ret=0;
  acts.forEach(d=>{ if((d.status==='change'||d.status==='add')&&d.newV){adjustStock(d.part,d.newV,-1);inst++;}

}

  const pc={}; recs.forEach(r=>pc[r.part]=(pc[r.part]||0)+1);
  let pp=Object.entries(pc).sort((a,b)=>b[1]-a[1]); let paretoParts=pp.slice(0,12); const prest=pp.slice(12).reduce((a,b)=>a+b[1],0); if(prest>0)paretoParts.push(['Lainnya',prest]);
  const ptot=paretoParts.reduce((a,b)=>a+b[1],0); let c1=0; const partCum=paretoParts.map(e=>{c1+=e[1];return ptot?Math.round(c1/ptot*100):0;});

  else { insights.push('Total '+recs.length+' replacements: '+scheduled+' scheduled, '+trouble+' trouble, '+emergency+' emergency.');

    // ---------- Stock ----------
    sheetFrom('Stock',
      [{header:'Area',key:'ar',width:14},{header:'Part',key:'p',width:18},{header:'Size',key:'sz',width:10},{header:'Qty',key:'q',width:8},{header:'Unit',key:'u',width:8},{header:'Lokasi',key:'lo',width:14},{header:'Catatan',key:'n',width:20}],
      STOCK.slice().map(s=>({ar:s.area||'',p:s.part||'',sz:s.size||'',q:s.qty||0,u:s.unit||'pcs',lo:s.location||'',n:s.note||''})));
    const buf=await wb.xlsx.writeBuffer();
    dl(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}), 'Laporan_PM_'+ymd(P.from)+'_sd_'+ymd(P.to)+'.xlsx');
    toast('✓ Excel created');
  }catch(e){ toast('Failed to create Excel: '+e.message,1); }
}

/* ---- FORECAST ---- */
function vFc(){
  const m=monitoring(),en=enriched();
  return `<h2 class="title">🔮 Spare Part Forecast${infoIcon('**Forecast** = the larger of (parts due within 30 days) and (average usage per month × 1.1 buffer). Recommended minimum stock should be greater than or equal to the forecast.')}</h2><div class="sub">Part demand prediction & minimum stock recommendation.</div>
  <div class="tblwrap"><table><thead><tr><th>Part</th><th>Target</th><th>Avg/Month</th><th>Due ≤30d</th><th>Due ≤60d</th><th>Due ≤90d</th><th>Forecast Next Month</th><th>Stock Min</th><th>Alert</th></tr></thead><tbody>
  ${CFG.parts.map(p=>{
    const d30=m.filter(x=>x.part===p&&x.rem>=0&&x.rem<=30).length;
    const d60=m.filter(x=>x.part===p&&x.rem>=0&&x.rem<=60).length;
    const d90=m.filter(x=>x.part===p&&x.rem>=0&&x.rem<=90).length;
    const recent=en.filter(r=>r.part===p&&daysBetween(r.d,TODAY)<=90).length;
    const avgMo=recent/3; const fc=Math.max(d30,Math.ceil(avgMo*1.1)); const smin=Math.max(fc,5);
    const al=d30>5?'HIGH':d30>2?'MEDIUM':d30>0?'LOW':'OK';
    const col=al==='HIGH'?'#ff5a5a':al==='MEDIUM'?'#ff8c3b':al==='LOW'?'#ffd23f':'#3fd77a';
    return `<tr><td><b>${p}</b></td><td class="mono">${lifetimeOf(p)}d</td><td class="mono">${avgMo.toFixed(1)}</td>
    <td class="mono">${d30}</td><td class="mono">${d60}</td><td class="mono">${d90}</td><td class="mono"><b>${fc}</b></td>
    <td class="mono">${smin} pcs</td><td><span style="color:${col};font-weight:700">${al}</span></td></tr>`}).join('')}
  </tbody></table></div>`;
}

let _setOpen={};
function toggleAllSet(open){ const view=document.querySelector('#main .view'); if(!view)return;
  view.querySelectorAll('.setcard').forEach(function(card){ const h=card.querySelector('h3.setcard-h'); const key=h?(h.getAttribute('data-key')||''):''; if(key)_setOpen[key]=open; card.classList.toggle('open',open); }); }
function enhanceSettingsCollapse(){
  if(current!=='set')return;
  const view=document.querySelector('#main .view'); if(!view)return;
  const cards=Array.prototype.slice.call(view.querySelectorAll('.card')).filter(function(c){
    return !(c.parentElement && c.parentElement.closest && c.parentElement.closest('.card'));
  });
  cards.forEach(function(card){
    const h=card.querySelector('h3'); if(!h || h.parentElement!==card) return;
    const tmp=h.cloneNode(true); tmp.querySelectorAll('.tag,.setchev,.al-go').forEach(function(e){e.remove();});
    const key=(tmp.textContent||'').replace(/\s+/g,' ').trim();
    const body=document.createElement('div'); body.className='setbody';
    let n=h.nextSibling; while(n){ const nx=n.nextSibling; body.appendChild(n); n=nx; }
    card.appendChild(body);
    card.classList.add('setcard');
    if(!h.querySelector('.setchev')){ const cv=document.createElement('span'); cv.className='setchev'; cv.textContent='\u25B8'; h.appendChild(cv); }
    h.classList.add('setcard-h'); h.setAttribute('data-key',key); h.style.cursor='pointer';
    const open=!!_setOpen[key]; card.classList.toggle('open',open);
    h.addEventListener('click',function(){ const willOpen=!card.classList.contains('open'); _setOpen[key]=willOpen; card.classList.toggle('open',willOpen); });
    if(card.parentElement && card.parentElement.classList.contains('grid')) card.parentElement.style.alignItems='flex-start';
  });
}

/* ---------- EXCEL (.xlsx) IMPORT / EXPORT / SYNC ---------- */
let xlsxHandle=null, xlsxName='';
function buildWorkbook(){
  const en=enriched();
  const dataAOA=[['No','Tgl Replacement','Machine','Section','Part','Category','Reason / Trouble','Shift']];
  en.forEach((r,i)=>dataAOA.push([i+1, (r.d instanceof Date?r.d:parseD(r.date)), r.machine, r.section, r.part, r.cat, r.reason||'', r.pic||'']));
  const mon=monitoring();
  const monAOA=[['No','Machine','Section','Part','Lifetime','Last Replace','Next Due','Sisa Hari','Status','Total','Trouble']];
  mon.forEach((m,i)=>monAOA.push([i+1,m.machine,m.section,m.part,m.lt,(m.last||''),(m.nextDue||''),m.rem,m.status,m.count,m.trouble]));
  const wb=XLSX.utils.book_new();
  const wsD=XLSX.utils.aoa_to_sheet(dataAOA,{cellDates:true});
  wsD['!cols']=[{wch:5},{wch:16},{wch:9},{wch:9},{wch:14},{wch:11},{wch:24},{wch:12}];
  for(let i=2;i<=dataAOA.length;i++){const ref=XLSX.utils.encode_cell({r:i-1,c:1});if(wsD[ref]&&wsD[ref].t==='d')wsD[ref].z='dd/mm/yyyy';}
  const wsM=XLSX.utils.aoa_to_sheet(monAOA,{cellDates:true});
  wsM['!cols']=[{wch:5},{wch:9},{wch:9},{wch:14},{wch:9},{wch:13},{wch:13},{wch:10},{wch:11},{wch:8},{wch:9}];
  for(let i=2;i<=monAOA.length;i++){[5,6].forEach(c=>{const ref=XLSX.utils.encode_cell({r:i-1,c:c});if(wsM[ref]&&wsM[ref].t==='d')wsM[ref].z='dd/mm/yyyy';});}
  XLSX.utils.book_append_sheet(wb,wsD,'DATA');
  XLSX.utils.book_append_sheet(wb,wsM,'MONITORING');
  return wb;
}
function exportXLSX(){ try{ XLSX.writeFile(buildWorkbook(),'IS_Machine_PM_'+new Date().toISOString().slice(0,10)+'.xlsx'); toast('✓ Excel downloaded'); }catch(e){ toast('Export failed',1); } }
function normDate(v){ if(v===null||v===undefined||v==='')return''; if(v instanceof Date){const z=new Date(v.getTime()-v.getTimezoneOffset()*60000);return z.toISOString().slice(0,10);} const s=String(v).trim();
  let m=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/); if(m){let a=m[1],b=m[2],y=m[3]; if(y.length===2)y='20'+y; return y+'-'+String(b).padStart(2,'0')+'-'+String(a).padStart(2,'0');}
  m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/); if(m)return m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0');
  const dt=new Date(s); if(!isNaN(dt)){const z=new Date(dt.getTime()-dt.getTimezoneOffset()*60000);return z.toISOString().slice(0,10);} return s; }
async function loadWorkbookFile(file){
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{cellDates:true});
    let wsName=wb.SheetNames.find(n=>n.toUpperCase()==='DATA')||wb.SheetNames.find(n=>n.toUpperCase().includes('DB'))||wb.SheetNames[0];
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wsName],{header:1,raw:true});
    let hi=rows.findIndex(r=>r&&r.some(c=>String(c).toLowerCase().includes('machine'))&&r.some(c=>String(c).toLowerCase().includes('part')));
    if(hi<0) hi=0;
    const head=rows[hi].map(c=>String(c||'').toLowerCase());
    const col=(...keys)=>head.findIndex(h=>keys.some(k=>h.includes(k)));
    const ci={date:col('tgl','date','tanggal'),mc:col('machine','mesin'),sec:col('section','sec'),part:col('part'),reason:col('reason','trouble','alasan'),pic:col('shift','pic')};
    if(ci.mc<0||ci.part<0){ toast('Machine/Part column not found',1); return; }
    const out=[];
    for(let i=hi+1;i<rows.length;i++){const r=rows[i]; if(!r||r.length===0)continue;
      const mc=r[ci.mc], part=r[ci.part]; if(!mc||!part)continue;
      out.push({date:normDate(r[ci.date]),machine:String(mc).trim(),section:String(ci.sec>=0?r[ci.sec]||'':'').trim(),part:String(part).trim(),reason:String(ci.reason>=0?r[ci.reason]||'':'').trim(),pic:String(ci.pic>=0?r[ci.pic]||'':'').trim()});
    }
    if(out.length){ DB=out; saveAll(); buildNav(); render(); toast('✓ '+out.length+' baris dimuat dari Excel'); }
    else toast('No valid rows',1);
  }catch(e){ toast('Failed to read Excel file',1); }
}
function importXLSX(input){const f=input.files[0]; if(f) loadWorkbookFile(f); input.value='';}
async function linkExcel(){
  if(!('showOpenFilePicker' in window)){ toast('Browser not supported — use Import/Export',1); return; }
  try{ const handles=await window.showOpenFilePicker({types:[{description:'Excel',accept:{'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet':['.xlsx']}}]});
    xlsxHandle=handles[0]; xlsxName=xlsxHandle.name; const f=await xlsxHandle.getFile(); await loadWorkbookFile(f); render(); toast('🔗 Connected: '+xlsxName);
  }catch(e){ if(e.name!=='AbortError') toast('Failed to open file',1); } }
async function saveExcel(){
  const wb=buildWorkbook();
  if(xlsxHandle){ try{ const w=await xlsxHandle.createWritable(); const buf=XLSX.write(wb,{type:'array',bookType:'xlsx'}); await w.write(new Uint8Array(buf)); await w.close(); toast('✓ Saved to '+xlsxName); return; }catch(e){ toast('Failed to write file; downloaded instead',1); } }
  exportXLSX();
}
function importJSON(inp){const f=inp.files[0];if(!f)return;const rd=new FileReader();rd.onload=e=>{try{const o=JSON.parse(e.target.result);

function resetData(){if(!confirm('Reset ke 218 data awal? Data saat ini akan hilang.'))return;DB=SEED_DATA.map(r=>({...r}));CFG=JSON.parse(JSON.stringify(DEFAULT_CFG));actionStatus={};saveAll();toast('Data reset');buildNav();render();}

/* ============ INIT ============ */
function tickClock(){const t=$('#today'); if(t){const now=bangkokNow();const hh=String(now.getHours()).padStart(2,'0'),mm=String(now.getMinutes()).padStart(2,'0'),ss=String(now.getSeconds()).padStart(2,'0');
    t.innerHTML='<b>'+fmtD(TODAY)+'</b> · '+hh+':'+mm+':'+ss+' <span style="color:var(--txt3);font-size:10px">ICT</span>';}
  const hs=$('#hstat'); if(hs){const m=monitoring();const bad=m.filter(x=>x.status==='OVERDUE'||x.status==='URGENT').length; hs.textContent=bad>0?bad+' perlu aksi':'Aman ✓'; hs.style.color=bad>0?'#ff8c3b':'#3fd77a';}}
(async function(){
  // surface any uncaught error visibly instead of a blank screen — tapi data tetap aman di perangkat
  window.addEventListener('error',ev=>{ try{ var b=document.getElementById('bootErr'); if(b){ b.textContent='⚠️ '+(ev.message||'Script error')+' — data Anda tetap tersimpan di perangkat (aman). Ketuk untuk menutup.'; b.style.display='block'; b.style.cursor='pointer'; b.onclick=function(){ b.style.display='none'; }; } }catch(_){ } });
  try{ await loadAll(); }catch(e){ console.error('loadAll failed:',e); }
  try{ Cloud.dirty = (localStorage.getItem('pm_dirty')==='1'); }catch(e){}   // pulihkan status "belum tersinkron" setelah reload → lindungi input lokal
  try{ var _lr0=parseInt(localStorage.getItem('pm_lastrev'),10); Cloud.lastRev=isNaN(_lr0)?null:_lr0; }catch(e){}   // pulihkan revisi cloud terakhir yang sudah diserap
  try{ applyTheme(); }catch(e){ console.error(e); }
  try{ applyScale(); }catch(e){ console.error(e); }
  try{ updateFsBtn(); }catch(e){ console.error(e); }
  try{ tickClock(); }catch(e){ console.error(e); }
  try{ buildNav(); }catch(e){ console.error(e); }
  try{ render(); }catch(e){ console.error('initial render failed:',e); }
  try{ syncLayout(); }catch(e){ console.error(e); }
  try{ let cc=cloudCfgGet();
    if(!(cc&&cc.enabled&&cc.url) && CLOUD_DEFAULT && CLOUD_DEFAULT.url){ cc={ url:CLOUD_DEFAULT.url, room:CLOUD_DEFAULT.room||'pmdata', secret:CLOUD_DEFAULT.secret||'', poll:12, enabled:true }; cloudCfgSet(cc); }
    // URL di dalam file = sumber kebenaran: bila beda dgn yang tersimpan, pakai URL file (deploy ulang cukup update file)
    else if(cc && CLOUD_DEFAULT && CLOUD_DEFAULT.url && cc.url!==CLOUD_DEFAULT.url){ cc.url=CLOUD_DEFAULT.url; cc.enabled=true; Cloud.lastRev=null; cloudCfgSet(cc); }
    if(cc && cc.enabled && cc.url){ gsConnect(cc); if(Cloud.dirty) setTimeout(()=>gsPush(true),1200); }   // ada input lokal belum terkirim → segera kirim ulang
  }catch(e){}
  document.addEventListener('input',e=>{if(['i_part','i_date','i_reason','i_reason_sel','i_section','i_machine'].includes(e.target.id))previewLive();});
  // re-apply desktop side-nav / mobile bottom-nav on resize
  let _rt; window.addEventListener('resize',()=>{clearTimeout(_rt);_rt=setTimeout(syncLayout,150);});
  // keep header fullscreen icon in sync (mis. saat keluar via Esc)
  ['fullscreenchange','webkitfullscreenchange','mozfullscreenchange','MSFullscreenChange'].forEach(function(ev){ document.addEventListener(ev, updateFsBtn); });
  // shortcut: tekan F untuk masuk/keluar layar penuh (tidak aktif saat mengetik di form)
  document.addEventListener('keydown',function(e){
    if(e.ctrlKey||e.metaKey||e.altKey)return;
    var t=e.target, tag=(t&&t.tagName)||'';
    if(/^(INPUT|TEXTAREA|SELECT)$/.test(tag)||(t&&t.isContentEditable))return;
    if(e.key==='f'||e.key==='F'){ e.preventDefault(); toggleFullscreen(); }
  });
  // swipe left/right ganti mesin — DIMATIKAN: di iOS gesture ini memblok scroll tabel ke samping.
  // Ganti mesin tetap bisa lewat tombol panah ‹ › dan tombol keyboard ←/→.
  // (sengaja tidak memasang touchstart/touchend pada #mbox)
  // arrow keys when popup open
  document.addEventListener('keydown',e=>{const hm=document.getElementById('hmodal');
    if(hm&&hm.classList.contains('show')){ if(e.key==='Escape')closeHmodal(); return; }
    const cmod=document.getElementById('cmodal');
    if(cmod&&cmod.classList.contains('show')){ if(e.key==='Escape')closeCmodal(); return; }
    const sf=document.getElementById('sfmodal');
    if(sf&&sf.classList.contains('show')){ if(e.key==='Escape')closeSchedFull(); return; }
    const mm=document.getElementById('mmodal');
    if(mm&&mm.classList.contains('show')){ if(e.key==='ArrowRight')navMachine(1); else if(e.key==='ArrowLeft')navMachine(-1); else if(e.key==='Escape')closeMmodal(); }});
  // resume rolling/demo mode if it was left on
  if(CFG.demo) beginDemo();
  setInterval(tickClock,1000);
})();

/* ===== Tarik-tutup sheet: geser header ke bawah untuk menutup pop-up (mobile) ===== */
(function(){
  var closers={mmodal:'closeMmodal',jcmodal:'closeJC',jcmmodal:'closeJCMaster',hmodal:'closeHmodal',amodal:'closeAmodal',sfmodal:'closeSchedFull'};
  var drag=null;
  function isSheet(){return window.matchMedia('(max-width:680px)').matches;}
  document.addEventListener('touchstart',function(e){
    if(!isSheet()||e.touches.length!==1)return;
    var mh=e.target.closest&&e.target.closest('.mh'); if(!mh)return;
    var box=mh.closest('.mbox'); if(!box)return;
    var modal=box.closest('.mmodal'); if(!modal||!modal.classList.contains('show'))return;
    drag={box:box,modal:modal,y0:e.touches[0].clientY,dy:0,t0:Date.now(),
      onBtn:!!(e.target.closest&&e.target.closest('button'))};
    box.classList.add('dragging');
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!drag)return;
    var dy=e.touches[0].clientY-drag.y0;
    if(dy<0)dy=0;                         // hanya ke bawah
    drag.dy=dy;
    drag.box.style.transform=dy?('translateY('+dy+'px)'):'';
    var k=Math.max(0,1-dy/650);
    drag.modal.style.background='rgba(4,8,16,'+(0.6*k).toFixed(3)+')';
  },{passive:true});
  function endDrag(){
    if(!drag)return; var d=drag; drag=null;
    d.box.classList.remove('dragging');
    d.box.style.transition='transform .26s cubic-bezier(.4,0,.2,1)';
    d.modal.style.transition='background .26s';
    var vel=d.dy/Math.max(1,(Date.now()-d.t0));   // px per ms
    var doClose=(d.dy>150)||(vel>0.55 && d.dy>40);
    if(doClose){
      d.box.style.transform='translateY(110%)';
      var fn=closers[d.modal.id];
      setTimeout(function(){
        if(fn&&window[fn])window[fn]();
        d.box.style.transition='';d.box.style.transform='';
        d.modal.style.transition='';d.modal.style.background='';
      },240);
    }else{
      d.box.style.transform='';d.modal.style.background='';
      setTimeout(function(){d.box.style.transition='';d.modal.style.transition='';},300);
    }
  }
  document.addEventListener('touchend',endDrag,{passive:true});
  document.addEventListener('touchcancel',endDrag,{passive:true});
})();
